name: flicko_demo
description: "TikTok-style short video feed + LiveKit live streaming demo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Video playback + built-in caching (flutter_cache_manager under the hood)
  cached_video_player_plus: ^3.0.2

  # LiveKit real-time streaming
  livekit_client: ^2.4.3

  # Temp dir for isolate-downloaded files
  path_provider: ^2.1.5

  # Secrets / env config
  flutter_dotenv: ^5.2.1

  # JWT token generation for LiveKit (on-device, demo only)
  dart_jsonwebtoken: ^3.4.1

  # Font — Nunito (matches TikTok's rounded bold sans-serif style)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - .env
